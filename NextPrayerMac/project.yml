name: NextPrayer
options:
  bundleIdPrefix: net.mawaqit
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

targets:
  NextPrayer:
    type: application
    platform: macOS
    sources:
      - path: NextPrayer
        excludes:
          - "*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.mawaqit.NextPrayer
        PRODUCT_NAME: NextPrayer
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: "GPL-3.0"
        CODE_SIGN_ENTITLEMENTS: NextPrayer/NextPrayer.entitlements
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        SWIFT_VERSION: "5.0"
        ENABLE_HARDENED_RUNTIME: YES

schemes:
  NextPrayer:
    build:
      targets:
        NextPrayer: all
    run:
      config: Debug
    archive:
      config: Release
